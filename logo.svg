<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 232 96" width="232" height="96" role="img" aria-label="大蓝营">
  <!-- 仿小红书字标:圆角矩形 + 厚重白字;红 #FF2442 → 蓝 #2442FF(RGB 通道对调) -->
  <rect width="232" height="96" rx="22" fill="#2442FF"/>
  <text x="116" y="51" text-anchor="middle" dominant-baseline="central"
        font-size="56" font-weight="900" letter-spacing="6" fill="#FFFFFF"
        stroke="#FFFFFF" stroke-width="2.2" stroke-linejoin="round" paint-order="stroke"
        font-family="'PingFang SC','Hiragino Sans GB','Source Han Sans SC','Noto Sans SC','Microsoft YaHei',sans-serif">大蓝营</text>
</svg>
