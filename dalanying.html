  /* ---------- 笔记详情 ---------- */

</script>
<script>
"use strict";

/* ================= 状态 ================= */
const liked = new Set();
const starred = new Set();
const followed = new Set();
let activeTab = "推荐";
let query = "";
let currentId = null;
let nextId = 100;

const $ = (id) => document.getElementById(id);
const feedEl = $("feed");
const tabsEl = $("tabs");

/* ================= 工具 ================= */
function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function fmt(n) {
  if (n >= 10000) {
    const v = (n / 10000).toFixed(1);
    return (v.endsWith(".0") ? v.slice(0, -2) : v) + "万";
  }
  return String(n);
}
function graphemes(s) {
  if (typeof Intl !== "undefined" && Intl.Segmenter) {
    return Array.from(new Intl.Segmenter("zh", { granularity: "grapheme" }).segment(s), (x) => x.segment);
  }
  return [...s];
}
function getPost(id) { return POSTS.find((p) => p.id === id); }
function likeCount(p) { return p.likes + (liked.has(p.id) ? 1 : 0); }
function starCount(p) { return p.stars + (starred.has(p.id) ? 1 : 0); }

let toastTimer = null;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

/* ================= Tabs ================= */
function renderTabs() {
  tabsEl.innerHTML = TABS.map((t) =>
    `<button class="tab${t === activeTab ? " active" : ""}" role="tab" aria-selected="${t === activeTab}" data-tab="${t}">${t}</button>`
  ).join("");
}
tabsEl.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-tab]");
  if (!btn) return;
  activeTab = btn.dataset.tab;
  renderTabs();
  renderFeed();
});

/* ================= 瀑布流 ================= */
function visiblePosts() {
  let list = POSTS;
  if (activeTab !== "推荐") {
    const cat = CATS[activeTab];
    list = list.filter((p) => p.cat === cat);
  }
  if (query) {
    const q = query.toLowerCase();
    list = list.filter((p) =>
      [p.title, p.author, ...p.tags].join("\n").toLowerCase().includes(q)
    );
  }
  return list;
}

function cardHTML(p) {
  return `
    <article class="card" data-id="${p.id}">
      <div class="cover ${p.g}" style="aspect-ratio:${p.ratio}">
        <span class="cover-emoji">${esc(p.emoji)}</span>
        <span class="cover-text">${esc(p.coverText)}</span>
      </div>
      <div class="card-title">${esc(p.title)}</div>
      <div class="card-foot">
        <span class="card-author"><span class="avatar">${esc(p.avatar)}</span><span class="name">${esc(p.author)}</span></span>
        <button class="like-btn${liked.has(p.id) ? " liked" : ""}" data-like="${p.id}" aria-label="点赞">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path></svg>
          <span>${fmt(likeCount(p))}</span>
        </button>
      </div>
    </article>
  `;
}

function colCount() {
  const w = window.innerWidth;
  if (w >= 1700) return 5;
  if (w > 1250) return 4;
  if (w > 860) return 3;
  return 2;
}
let lastCols = 0;

function renderFeed() {
  const list = visiblePosts();
  lastCols = colCount();
  if (!list.length) {
    feedEl.innerHTML = `<div class="empty"><div class="empty-emoji">🫥</div>没有找到相关笔记,换个关键词试试?<br>或者点「发布」,第一篇让你来写</div>`;
    return;
  }
  // 按估算高度贪心分列:高度相同时从左往右铺,阅读顺序与小红书一致
  const cols = Array.from({ length: lastCols }, () => ({ h: 0, html: "" }));
  for (const p of list) {
    const target = cols.reduce((a, b) => (b.h < a.h ? b : a));
    const [rw, rh] = p.ratio.split("/").map(Number);
    target.h += rh / rw + 0.35;
    target.html += cardHTML(p);
  }
  feedEl.innerHTML = cols.map((c) => `<div class="feed-col">${c.html}</div>`).join("");
}

let resizeTimer = null;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (colCount() !== lastCols) renderFeed(); }, 150);
});

feedEl.addEventListener("click", (e) => {
  const likeBtn = e.target.closest("[data-like]");
  if (likeBtn) {
    e.stopPropagation();
    toggleLike(Number(likeBtn.dataset.like));
    return;
  }
  const card = e.target.closest(".card[data-id]");
  if (card) openPost(Number(card.dataset.id));
});

function toggleLike(id) {
  const p = getPost(id);
  if (!p) return;
  if (liked.has(id)) { liked.delete(id); }
  else { liked.add(id); toast("已点赞,散帅眼光不错 💙"); }
  const btn = feedEl.querySelector(`[data-like="${id}"]`);
  if (btn) {
    btn.classList.toggle("liked", liked.has(id));
    btn.querySelector("span").textContent = fmt(likeCount(p));
  }
  if (currentId === id) syncModalActs(p);
}

/* ================= 搜索 ================= */
$("searchInput").addEventListener("input", (e) => {
  query = e.target.value.trim();
  renderFeed();
});

/* ================= 弹窗开关 ================= */
function openMask(id) {
  $(id).classList.add("open");
  document.body.classList.add("no-scroll");
}
function closeMasks() {
  document.querySelectorAll(".modal-mask.open").forEach((m) => m.classList.remove("open"));
  document.body.classList.remove("no-scroll");
  currentId = null;
}
document.querySelectorAll(".modal-mask").forEach((mask) => {
  // 记录按下位置:从输入框划选文字、在遮罩上松手时不误关弹窗
  let downOnMask = false;
  mask.addEventListener("mousedown", (e) => { downOnMask = e.target === mask; });
  mask.addEventListener("click", (e) => {
    if (e.target.closest("[data-close]")) { closeMasks(); return; }
    if (e.target === mask && downOnMask) closeMasks();
    downOnMask = false;
  });
});
document.addEventListener("keydown", (e) => {
  // 中文输入法组合中按 Esc 只是取消候选词,不应关闭弹窗
  if (e.key === "Escape" && !e.isComposing && e.keyCode !== 229) closeMasks();
});

/* ================= 笔记详情 ================= */
function syncModalActs(p) {
  const likeEl = $("pmLike"), starEl = $("pmStar");
  likeEl.classList.toggle("on", liked.has(p.id));
  starEl.classList.toggle("on", starred.has(p.id));
  $("pmLikeCount").textContent = fmt(likeCount(p));
  $("pmStarCount").textContent = fmt(starCount(p));
}

function renderComments(p) {
  $("pmCommentCount").textContent = `共 ${p.comments.length} 条评论`;
  $("pmCmtCount").textContent = p.comments.length;
  $("pmComments").innerHTML = p.comments.map((c) => `
    <div class="comment">
      <span class="avatar">${c.avatar}</span>
      <div class="c-main">
        <div class="c-name">${esc(c.name)}</div>
        <div class="c-text">${esc(c.text)}</div>
        <div class="c-meta">${esc(c.date)} · 回复</div>
      </div>
    </div>
  `).join("");
}

function openPost(id) {
  const p = getPost(id);
  if (!p) return;
  currentId = id;
  const cover = $("pmCover");
  cover.className = "post-cover " + p.g;
  $("pmEmoji").textContent = p.emoji;
  $("pmCoverText").textContent = p.coverText;
  $("pmAvatar").textContent = p.avatar;
  $("pmAuthor").textContent = p.author;
  $("pmTitle").textContent = p.title;
  $("pmBody").textContent = p.body;
  $("pmTags").innerHTML = p.tags.map((t) => `<span># ${esc(t)}</span>`).join("");
  $("pmDate").textContent = `编辑于 ${p.date} · IP属地:蓝营 · ${CAT_NAME[p.cat] || "推荐"}`;
  const fBtn = $("pmFollow");
  const isF = followed.has(p.author);
  fBtn.textContent = isF ? "已关注" : "关注";
  fBtn.classList.toggle("followed", isF);
  syncModalActs(p);
  renderComments(p);
  $("pmInput").value = "";
  openMask("postMask");
  document.querySelector(".post-scroll").scrollTop = 0;
}

$("pmCmt").addEventListener("click", () => {
  $("pmCommentCount").scrollIntoView({ behavior: "smooth", block: "start" });
  $("pmInput").focus();
});

$("pmFollow").addEventListener("click", () => {
  const p = getPost(currentId);
  if (!p) return;
  if (followed.has(p.author)) {
    followed.delete(p.author);
    toast("已取消关注");
  } else {
    followed.add(p.author);
    toast(`已关注 ${p.author},兄弟常来 🤝`);
  }
  const isF = followed.has(p.author);
  $("pmFollow").textContent = isF ? "已关注" : "关注";
  $("pmFollow").classList.toggle("followed", isF);
});

$("pmLike").addEventListener("click", () => { if (currentId != null) toggleLike(currentId); });

$("pmStar").addEventListener("click", () => {
  const p = getPost(currentId);
  if (!p) return;
  if (starred.has(p.id)) { starred.delete(p.id); }
  else { starred.add(p.id); toast("已收藏,记进你的小蓝书 📘"); }
  syncModalActs(p);
});

function sendComment() {
  const p = getPost(currentId);
  if (!p) return;
  const input = $("pmInput");
  const text = input.value.trim();
  if (!text) { toast("说点什么再发,兄弟"); return; }
  p.comments.push({ avatar: "😎", name: "本散帅", text, date: "刚刚" });
  input.value = "";
  renderComments(p);
  const scroll = document.querySelector(".post-scroll");
  scroll.scrollTop = scroll.scrollHeight;
  toast("评论成功 💙");
}
$("pmSend").addEventListener("click", sendComment);
$("pmInput").addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.isComposing) sendComment(); });

/* ================= 发布 ================= */
const GRADS = ["g1", "g2", "g3", "g4", "g6", "g9", "g10"];
$("pubSubmit").addEventListener("click", () => {
  const title = $("pubTitle").value.trim();
  const body = $("pubBody").value.trim();
  if (!title) { toast("标题不能为空,散帅要有排面"); return; }
  const cat = $("pubCat").value;
  const emoji = graphemes($("pubEmoji").value.trim())[0] || "📝";
  const id = nextId++;
  POSTS.unshift({
    id, cat, g: GRADS[id % GRADS.length], ratio: "3/4",
    emoji, coverText: graphemes(title).slice(0, 8).join(""), likes: 0, stars: 0,
    title, author: "本散帅", avatar: "😎", date: "今天",
    body: body || "这个散帅很酷,什么正文都没写。",
    tags: [CAT_NAME[cat], "散帅日常"],
    comments: [{ avatar: "📣", name: "蓝营指导员", text: "沙发!欢迎新笔记,散帅们快来围观", date: "刚刚" }]
  });
  $("pubTitle").value = ""; $("pubBody").value = ""; $("pubEmoji").value = "";
  closeMasks();
  activeTab = "推荐";
  query = "";
  $("searchInput").value = "";
  renderTabs();
  renderFeed();
  toast("发布成功,散帅们看得到你 💙");
  window.scrollTo({ top: 0, behavior: "smooth" });
});

  activeTab = "推荐";
  query = "";

  renderTabs();

$("topAvatar").addEventListener("click", () => openMask("meMask"));
$("btnCreator").addEventListener("click", () => toast("散帅创作中心装修中,敬请期待 🚧"));

/* ================= 启动 ================= */
renderTabs();
renderFeed();
</script>
